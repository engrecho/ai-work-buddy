# ============================================================
# Nginx 站点配置 - AI-Buddy
# 在宝塔面板中: 网站 → 设置 → 配置文件，替换为以下内容
# ============================================================

server {
    listen 80;
    server_name buddy.bajiaolu.cn;

    root /www/wwwroot/buddy.bajiaolu.cn/build;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ── API 代理 ─────────────────────────────────────────────
    # 转发 /api/ 请求到 Express 后端（localhost:3000）
    # 注意：proxy_pass 不加尾部斜杠，保留 /api/ 前缀
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── buddy-skill 自更新（静态文件，必须在 SPA 回退之前）──────
    location = /buddy-skill.tar.gz {
        add_header Content-Type application/gzip;
        add_header Cache-Control "no-cache";
    }
    location = /buddy-skill.version {
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache";
    }

    # ── Vite 开发产物拦截（生产环境不应存在，返回 404 而非 SPA 回退）──
    location ^~ /@vite/ {
        return 404;
    }
    location = /src/ {
        return 404;
    }

    # ── 前端路由（SPA 回退）──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建文件名含 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 图片资源缓存
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ /\. {
        deny all;
    }
}
