# ============================================================
# Nginx 站点配置 - AI Work Buddy
# 在宝塔面板中: 网站 → 设置 → 配置文件，替换为以下内容
#
# 注意: 请将 <YOUR_DOMAIN> 替换为你的实际域名
#       请将 <PROJECT_PATH> 替换为项目实际路径（如 /www/wwwroot/ai-work-buddy）
# ============================================================

server {
    listen 80;
    server_name <YOUR_DOMAIN>;

    # 如果使用 HTTPS，取消注释以下配置（宝塔会自动配置 SSL）
    # listen 443 ssl;
    # ssl_certificate     /www/server/ssl/<YOUR_DOMAIN>.pem;
    # ssl_certificate_key /www/server/ssl/<YOUR_DOMAIN>.key;

    # 前端静态文件
    root <PROJECT_PATH>/build;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # ── PostgREST API 代理 ──────────────────────────────────
    # Supabase JS 客户端会请求 /rest/v1/ 路径
    # Nginx 去掉 /rest/v1 前缀后转发给 PostgREST
    location /rest/v1/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
    }

    # ── 前端路由（SPA） ──────────────────────────────────────
    # 所有非文件请求都回退到 index.html（React Router 支持）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建文件名含 hash，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
