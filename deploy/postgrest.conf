# ============================================================
# PostgREST 配置文件
# 路径: /opt/postgrest/postgrest.conf
#
# 使用前请替换以下占位符:
#   <JWT_SECRET>  → 运行 generate-jwt.js 生成的 JWT Secret
# ============================================================

# 数据库连接（宝塔 PostgreSQL）
db-uri = "postgres://buddy:j4ayJcydix2fGYdc@localhost:5432/buddy"

# 数据库 schema
db-schemas = "public"

# 匿名角色（与 db-schema.sql 中创建的 anon 角色对应）
db-anon-role = "anon"

# JWT 密钥（替换为 generate-jwt.js 生成的值）
jwt-secret = "<JWT_SECRET>"

# 服务监听地址和端口（仅本机访问，由 Nginx 反向代理）
server-host = "127.0.0.1"
server-port = 3000

# 日志级别
log-level = "info"

# 允许的跨域来源（设置为前端域名，或 * 表示不限制）
# 生产环境建议设置为具体域名，如 "https://workbuddy.bajiaolu.cn"
server-cors = true
